# Gesture Configuration
# Thresholds and mappings for all V1 gestures

# Static gesture thresholds (landmark distance ratios)
thresholds:
  pinch_ratio: 0.08          # dist(thumb_tip, index_tip) / palm_width
  two_finger_pinch_ratio: 0.08  # dist(thumb_tip, middle_tip) / palm_width
  finger_curl_extended: 0.8  # curl_ratio > this = extended
  finger_curl_curled: 0.5    # curl_ratio < this = curled
  thumb_abduction_angle: 30  # degrees from index finger axis
  palm_width_normalizer: true # use dist(wrist, middle_mcp) as scale

# Dynamic gesture thresholds (motion-based)
dynamics:
  swipe:
    window_frames: 6         # frames in sliding window
    min_displacement: 0.1    # normalized displacement threshold
    min_velocity: 0.02       # velocity per frame
  rotation:
    window_frames: 5
    angle_threshold: 30      # degrees cumulative rotation to fire
  double_pinch:
    max_interval: 0.5        # seconds between two pinches

# State machine
state_machine:
  confirm_frames: 3          # consecutive frames to enter ACTIVE
  cooldown_ms: 200           # cooldown after RELEASE
  hold_trigger_ms: 500       # HOLD event fires after this duration

# Gesture-to-action mappings
gestures:
  open_palm:
    action: cursor_mode
    description: Enable cursor tracking mode
    confidence: 0.8

  pinch:
    action: left_click
    description: Pinch thumb and index finger
    confidence: 0.85

  two_finger_pinch:
    action: right_click
    description: Pinch thumb and middle finger
    confidence: 0.85

  swipe_left:
    action: previous_tab
    description: Swipe hand left
    confidence: 0.7

  swipe_right:
    action: next_tab
    description: Swipe hand right
    confidence: 0.7

  swipe_up:
    action: task_view
    description: Swipe hand up
    confidence: 0.7

  swipe_down:
    action: show_desktop
    description: Swipe hand down
    confidence: 0.7

  rotate_clockwise:
    action: volume_up
    description: Rotate wrist clockwise
    confidence: 0.75

  rotate_counterclockwise:
    action: volume_down
    description: Rotate wrist counterclockwise
    confidence: 0.75

  closed_fist:
    action: drag_start
    description: Closed fist - start drag
    confidence: 0.8

  double_pinch:
    action: play_pause
    description: Double pinch gesture
    confidence: 0.8

  thumbs_up:
    action: confirm
    description: Thumbs up to confirm
    confidence: 0.85

# Context-aware mappings (overrides per active app)
contexts:
  chrome:
    swipe_right: next_tab
    swipe_left: previous_tab
    swipe_up: new_tab
    swipe_down: close_tab
  spotify:
    swipe_right: next_song
    swipe_left: previous_song
    swipe_up: volume_up
    swipe_down: volume_down
  explorer:
    swipe_right: next_folder
    swipe_left: previous_folder
    swipe_up: parent_directory
    swipe_down: open_selected
